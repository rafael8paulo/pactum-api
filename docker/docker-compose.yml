services:
  postgres:
    image: postgres:16-alpine
    container_name: pactum-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pactum
      POSTGRES_USER: pactum
      POSTGRES_PASSWORD: pactum
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pactum -d pactum"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pactum-network
    restart: unless-stopped

volumes:
  postgres-data:
    name: pactum-postgres-data

networks:
  pactum-network:
    name: pactum-network
    driver: bridge
